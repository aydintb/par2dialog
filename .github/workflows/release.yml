name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin: par2dialog
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: par2dialog.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: par2dialog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            fontconfig \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/par2dialog-${{ matrix.target }}

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          
